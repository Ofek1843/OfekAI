<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Build your own workout · FuelPhysique</title><link rel="stylesheet" href="/css/manual-workout-builder.css"></head><body><main class="manual-page"><nav><a href="/my-workout-plans.html">← My Workout Plans</a><a href="/dashboard.html">Dashboard</a></nav><header><span class="badge">FuelPhysique</span><h1 id="pageTitle">Build your own workout plan</h1><p id="pageIntro">Already have a program? Rebuild it here to unlock live tracking, rest guidance, history and progress charts.</p></header><p id="status" role="status" aria-live="polite"></p>
