<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuelPhysique Workout History</title>
  <link rel="stylesheet" href="/css/workout-history.css">
</head>
<body>
  <main class="history-page">
    <nav class="page-nav"><a id="backLink" href="/dashboard.html">← Back to FuelPhysique</a><span style="display:flex;align-items:center;gap:18px"><a id="analyticsLink" href="/exercise-progress.html">Exercise Progress</a><a id="trackerLink" class="primary-link" href="/workout-tracker.html">+ Start Workout</a></span></nav>
    <header class="history-header"><span class="brand-badge">FuelPhysique</span><h1 id="pageTitle">Workout History</h1><p id="pageDescription">Review every workout and every completed set.</p></header>
    <section class="stats-grid" aria-label="Workout summary">
      <article><span id="workoutsLabel">Workouts</span><strong id="workoutCount">0</strong></article>
      <article><span id="setsLabel">Completed sets</span><strong id="completedSets">0</strong></article>
      <article><span id="timeLabel">Training time</span><strong id="trainingTime">0m</strong></article>
    </section>
    <p id="historyStatus" class="status" role="status" aria-live="polite">Loading workout history...</p>
    <section id="historyList" class="history-list"></section>
  </main>
  <script>if((localStorage.getItem("ofek-ai-language")||"en")==="he")document.querySelector("#analyticsLink").textContent="התקדמות בתרגילים";</script>
  <script type="module" src="/js/workout-history.js"></script>
  <script type="module" src="/js/site-feedback.js"></script>
</body>
</html>
