<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ofek AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: #f8fafc;
      min-height: 100vh;
    }

    .container {
      max-width: 950px;
      margin: 30px auto;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      padding: 22px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.5;
    }

    .clear-btn {
      width: auto;
      min-width: 130px;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #ef4444, #f97316);
      color: white;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
    }

    #chat {
      border-radius: 18px;
      min-height: 430px;
      max-height: 560px;
      overflow-y: auto;
      padding: 16px;
      background: linear-gradient(180deg, rgba(2, 6, 23, 0.95), rgba(15, 23, 42, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 16px;
      scroll-behavior: smooth;
    }

    .msg {
      margin: 12px 0;
      padding: 14px 16px;
      border-radius: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 16px;
    }

    .user {
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      color: white;
      text-align: left;
      margin-left: 0;
      margin-right: auto;
      max-width: 85%;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
    }

    .bot {
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #f8fafc;
      text-align: left;
      margin-right: 0;
      margin-left: auto;
      max-width: 92%;
    }

    .system {
      background: rgba(120, 53, 15, 0.18);
      border: 1px solid rgba(251, 146, 60, 0.45);
      color: #fed7aa;
      text-align: left;
      max-width: 100%;
    }

    .welcome {
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.15), rgba(56, 189, 248, 0.12));
      border: 1px solid rgba(56, 189, 248, 0.24);
      color: #e2e8f0;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 72px;
      max-height: 180px;
      padding: 14px;
      font-size: 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      outline: none;
    }

    textarea::placeholder {
      color: #94a3b8;
    }

    button {
      width: 130px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #22c55e, #06b6d4);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      padding: 0 14px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .typing {
      opacity: 0.8;
      font-style: italic;
    }

    @media (max-width: 700px) {
      .container {
        margin: 12px;
        padding: 16px;
      }

      h1 {
        font-size: 30px;
      }

      .input-row {
        flex-direction: column;
      }

      button,
      .clear-btn {
        width: 100%;
      }

      .user,
      .bot {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="brand">
        <h1>Ofek AI</h1>
        <p id="subtitle" class="subtitle">
          The artificial intelligence of Ofek Zahavi — fitness, nutrition, training progress, and high-quality evidence-based information.
        </p>
      </div>

      <button id="clearBtn" class="clear-btn">Clear Chat</button>
    </div>

    <div id="chat"></div>

    <div class="input-row">
      <textarea id="messageInput" placeholder="Write a message..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const subtitle = document.getElementById("subtitle");

    const messages = [];
    let currentLang = "en";

    function isHebrew(text) {
      return /[\u0590-\u05FF]/.test(text);
    }

    function setLanguage(lang) {
      currentLang = lang;

      if (lang === "he") {
        document.documentElement.lang = "he";
        document.documentElement.dir = "rtl";
        subtitle.textContent =
          "הבינה המלאכותית של אופק זהבי — כושר, תזונה, התקדמות באימונים ומידע מבוסס מחקרים איכותיים.";
        clearBtn.textContent = "נקה צ'אט";
        sendBtn.textContent = "שלח";
        input.placeholder = "כתוב הודעה...";
      } else {
        document.documentElement.lang = "en";
        document.documentElement.dir = "ltr";
        subtitle.textContent =
          "The artificial intelligence of Ofek Zahavi — fitness, nutrition, training progress, and high-quality evidence-based information.";
        clearBtn.textContent = "Clear Chat";
        sendBtn.textContent = "Send";
        input.placeholder = "Write a message...";
      }
    }

    function addMessage(text, sender = "bot", extraClass = "") {
      const div = document.createElement("div");
      div.className = `msg ${sender} ${extraClass}`.trim();

      if (currentLang === "he") {
        div.style.textAlign = "right";
      } else {
        div.style.textAlign = "left";
      }

      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function addWelcomeMessage(lang = "en") {
      if (lang === "he") {
        addMessage(
          "שלום! אני Ofek AI — הבינה המלאכותית של אופק זהבי.\nאני כאן כדי לסייע לך בכושר, תזונה, התקדמות באימונים, בחירת תרגילים והבנה טובה יותר של מה באמת מבוסס מחקר איכותי.\nאיך אפשר לעזור לך היום?",
          "bot",
          "welcome"
        );
      } else {
        addMessage(
          "Hello! I'm Ofek AI — the artificial intelligence of Ofek Zahavi.\nI'm here to help with fitness, nutrition, training progression, exercise selection, and understanding what is truly supported by high-quality research.\nHow can I help you today?",
          "bot",
          "welcome"
        );
      }
    }

    function clearChat() {
      chat.innerHTML = "";
      messages.length = 0;
      setLanguage(currentLang);
      addWelcomeMessage(currentLang);
      input.focus();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      const detectedLang = isHebrew(text) ? "he" : "en";

      if (messages.length === 0 && detectedLang !== currentLang) {
        chat.innerHTML = "";
        setLanguage(detectedLang);
        addWelcomeMessage(detectedLang);
      } else {
        setLanguage(detectedLang);
      }

      addMessage(text, "user");
      messages.push({ role: "user", content: text });
      input.value = "";
      sendBtn.disabled = true;

      const loadingText =
        currentLang === "he" ? "Ofek AI חושב..." : "Ofek AI is thinking...";

      const loadingMessage = addMessage(loadingText, "bot");
      loadingMessage.classList.add("typing");

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ messages }),
        });

        const data = await response.json();
        loadingMessage.remove();

        const reply =
          data.reply ||
          (currentLang === "he" ? "לא התקבלה תשובה." : "No response received.");

        if (!response.ok) {
          const details = data?.error
            ? "\n\n" +
              (currentLang === "he" ? "פרטי שגיאה:\n" : "Error details:\n") +
              JSON.stringify(data.error, null, 2)
            : "";

          addMessage(reply + details, "system");
          return;
        }

        addMessage(reply, "bot");
        messages.push({ role: "assistant", content: reply });
      } catch (error) {
        loadingMessage.remove();

        const errorText =
          currentLang === "he"
            ? "אירעה שגיאה בשליחת ההודעה.\n\n" + error.message
            : "An error occurred while sending the message.\n\n" + error.message;

        addMessage(errorText, "system");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    clearBtn.addEventListener("click", clearChat);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    setLanguage("en");
    addWelcomeMessage("en");
  </script>
</body>
</html>
